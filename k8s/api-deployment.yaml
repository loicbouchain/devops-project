apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-api
  template:
    metadata:
      labels:
        app: my-api
    spec:
     containers:
      - name: api
        image: mon-api:v1
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5 
          periodSeconds: 10
        env:
        - name: AWS_REGION
          value: "eu-west-3"
        - name: AWS_ENDPOINT
          value: "http://host.docker.internal:4566"
        - name: BUCKET_NAME
          value: "mon-bucket-terraform"
        - name: QUEUE_URL
          value: "http://host.docker.internal:4566/000000000000/ma-file-terraform" 
       