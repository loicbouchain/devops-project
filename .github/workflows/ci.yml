name: ci
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4

    - name: Installer Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: api/package-lock.json

    - name: Installer les dépendances
      run: |
        cd api
        npm install

    - name: Construire l'image Docker APi
      run: |
        cd api
        docker build -t mon-api:${{ github.sha }} .
  build-worker:
    runs-on: ubuntu-latest
    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v4

    - name: Installer Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: worker/package-lock.json

    - name: Installer les dépendances
      run: |
        cd worker
        npm install

    - name: Construire l'image Docker Worker
      run: |
        cd worker
        docker build -t mon-worker:${{ github.sha }} .